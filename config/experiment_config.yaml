# Experiment Configuration
# Paper: "Capped SNR-Adaptive Blending for Neural Speech Enhancement
#         in Meeting Transcription" (Liu, 2026)

dataset:
  source: "edinburghcstr/ami"
  split: "test"
  n_clips: 30
  clip_duration_sec: 10
  sample_rate: 16000

noise:
  types: ["babble", "office", "cafeteria", "traffic", "white", "pink", "brown", "fan"]
  snr_levels_db: [0, 5, 10, 15, 20, 25]
  # "clean" condition is also tested (no added noise)

snr_adaptive_blending:
  snr_ref: 20.0          # Reference SNR (dB) for sigmoid midpoint
  beta: 0.08             # Sigmoid steepness (conservative)
  alpha_max: 0.45        # Maximum blending coefficient (the "cap")
  frame_len: 1600        # Frame length in samples (100ms at 16kHz)

noise_floor_estimation:
  gamma: 0.98            # Smoothing factor
  eta: 2.0               # Noise-frame detection threshold
  delta: 1.001           # Slow upward drift factor
  epsilon: 1.0e-10       # Numerical stability

fixed_threshold_blending:
  # 5-class discrete alpha values
  classes:
    - snr_range: [0, 5]
      alpha: 0.45
    - snr_range: [5, 10]
      alpha: 0.35
    - snr_range: [10, 15]
      alpha: 0.25
    - snr_range: [15, 20]
      alpha: 0.15
    - snr_range: [20, 999]
      alpha: 0.05

enhancement_backend:
  model: "DeepFilterNet3"
  version: "0.5.6"
  internal_sr: 48000     # DeepFilterNet operates at 48kHz
  device: "cpu"          # Apple M1 Pro, no CUDA

metrics:
  - pesq    # ITU-T P.862 wideband
  - stoi    # Short-Time Objective Intelligibility
